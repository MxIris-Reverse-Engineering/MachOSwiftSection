name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish release
    runs-on: macos-26
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Locate changelog
        id: changelog
        run: |
          notes_file="Changelogs/${{ github.ref_name }}.md"
          if [ ! -f "$notes_file" ]; then
            echo "::error::Missing changelog file: $notes_file"
            echo "Create $notes_file before tagging this release."
            exit 1
          fi
          echo "path=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Swift version
        run: swift --version

      - name: Verify Version.swift matches tag
        run: |
          set -euo pipefail
          file="Sources/swift-section/Version.swift"
          value=$(grep -E 'static let value = "[^"]+"' "$file" | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$value" ]; then
            echo "::error file=$file::Failed to extract BundledVersion.value"
            exit 1
          fi
          if [ "$value" != "${{ github.ref_name }}" ]; then
            echo "::error file=$file::BundledVersion.value ($value) does not match tag (${{ github.ref_name }}). Bump Version.swift before tagging."
            exit 1
          fi
          echo "Version matches tag: $value"

      - name: Build x86_64
        run: swift build -c release --arch x86_64 --product swift-section

      - name: Build arm64
        run: swift build -c release --arch arm64 --product swift-section

      - name: Create universal binary
        run: |
          mkdir -p Products
          lipo -create \
            .build/x86_64-apple-macosx/release/swift-section \
            .build/arm64-apple-macosx/release/swift-section \
            -output ./Products/swift-section
          codesign --force --sign - ./Products/swift-section
          lipo -info ./Products/swift-section
          file ./Products/swift-section

      - name: Compress binary
        run: |
          cd Products
          zip swift-section-macos-universal.zip swift-section

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            Products/swift-section-macos-universal.zip \
            --title "${{ github.ref_name }}" \
            --notes-file "${{ steps.changelog.outputs.path }}"
